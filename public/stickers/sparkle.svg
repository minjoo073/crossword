<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="four point sparkle sticker">
  <title>Four-point sparkle</title>
  <defs>
    <radialGradient id="spG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#DFF6FF"/>
      <stop offset="100%" stop-color="#8FD4FF"/>
    </radialGradient>
  </defs>
  <!-- glow -->
  <circle cx="50" cy="50" r="30" fill="#8FD4FF" opacity="0.16"/>
  <!-- concave 4-point star (classic Y2K sparkle) -->
  <path fill="url(#spG)" stroke="#FFFFFF" stroke-width="1.5"
        d="M50 6
           C54 34 66 46 94 50
           C66 54 54 66 50 94
           C46 66 34 54 6 50
           C34 46 46 34 50 6 Z"/>
  <!-- small companion sparkle -->
  <path fill="#FFFFFF" opacity="0.9"
        d="M80 16 C81 24 84 27 92 28 C84 29 81 32 80 40 C79 32 76 29 68 28 C76 27 79 24 80 16 Z"/>
</svg>
