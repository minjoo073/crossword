<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="pastel star burst sticker">
  <title>Pastel star burst</title>
  <defs>
    <radialGradient id="sbCore" cx="50%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="38%" stop-color="#FFF3B0"/>
      <stop offset="70%" stop-color="#FFB4D8"/>
      <stop offset="100%" stop-color="#B5A8FF"/>
    </radialGradient>
    <linearGradient id="sbRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FD4FF"/>
      <stop offset="100%" stop-color="#FF9EC4"/>
    </linearGradient>
  </defs>
  <!-- soft glow halo -->
  <circle cx="50" cy="50" r="34" fill="#B5A8FF" opacity="0.18"/>
  <!-- 4 long pastel rays -->
  <g fill="url(#sbRay)">
    <path d="M50 4 L57 50 L50 96 L43 50 Z"/>
    <path d="M4 50 L50 43 L96 50 L50 57 Z"/>
  </g>
  <!-- 4 short diagonal rays -->
  <g fill="#A8E6CF" opacity="0.85">
    <path d="M22 22 L52 48 L78 78 L48 52 Z"/>
    <path d="M78 22 L52 48 L22 78 L48 52 Z"/>
  </g>
  <!-- bright core star -->
  <path fill="url(#sbCore)" stroke="#FFFFFF" stroke-width="1.5" d="M50 20 L57 43 L80 50 L57 57 L50 80 L43 57 L20 50 L43 43 Z"/>
  <!-- twinkle dot -->
  <circle cx="42" cy="40" r="4" fill="#FFFFFF" opacity="0.95"/>
</svg>
