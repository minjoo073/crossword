<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="K-POP CROSSWORD 마크">
  <title>K-POP CROSSWORD mark</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6f2ff"/>
      <stop offset="0.5" stop-color="#57b0f4"/>
      <stop offset="0.5" stop-color="#2c8ae6"/>
      <stop offset="1" stop-color="#0f5cc0"/>
    </linearGradient>
    <linearGradient id="tileGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="markChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#9aa8b8"/>
      <stop offset="0.52" stop-color="#5f6e80"/>
      <stop offset="0.75" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#aab6c4"/>
    </linearGradient>
  </defs>

  <!-- Aero app tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#0c4ea0"/>
  <rect x="10" y="10" width="108" height="108" rx="24" fill="url(#tile)" stroke="#0a3f86" stroke-width="1.5"/>
  <!-- top gloss -->
  <path d="M14 14 H114 a20 20 0 0 1 20 20 V58 c-40 14 -100 14 -140 0 V34 a20 20 0 0 1 20 -20 Z" fill="url(#tileGloss)" transform="translate(-4 -2)"/>

  <!-- mini crossword grid (white cells, decorative) -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="30" y="74" width="16" height="16" rx="2"/>
    <rect x="48" y="74" width="16" height="16" rx="2"/>
    <rect x="66" y="74" width="16" height="16" rx="2"/>
    <rect x="84" y="74" width="16" height="16" rx="2"/>
    <rect x="48" y="56" width="16" height="16" rx="2" opacity="0.7"/>
    <rect x="48" y="92" width="16" height="16" rx="2" opacity="0.7"/>
  </g>

  <!-- chrome K -->
  <text x="64" y="60" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="58" text-anchor="middle" fill="url(#markChrome)" stroke="#1d2a3a" stroke-width="3" paint-order="stroke" stroke-linejoin="round">K</text>
</svg>
